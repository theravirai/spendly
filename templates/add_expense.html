{% extends "base.html" %}

{% block title %}Add Expense — Outflow{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/expense.css') }}">
{% endblock %}

{% block content %}
<section class="expense-section">
    <div class="expense-container">
        <div class="expense-header">
            <a href="{{ url_for('profile') }}" class="back-link">
                <i data-lucide="arrow-left"></i> Back to Dashboard
            </a>
            <h1 class="expense-title">Add New Expense</h1>
            <p class="expense-subtitle">Enter the details of your transaction below</p>
        </div>

        <div class="expense-card">
            {% if error %}
            <div class="error-banner">
                <i data-lucide="alert-circle"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('add_expense') }}">
                <div class="form-group">
                    <label for="amount">Amount (€)</label>
                    <div class="amount-input-wrapper">
                        <span class="currency-symbol">€</span>
                        <input type="number" id="amount" name="amount" 
                               class="form-input" placeholder="0.00" 
                               step="0.01" min="0.01" value="{{ amount or '' }}" 
                               required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <div class="select-wrapper">
                        <select id="category" name="category" class="form-input" required>
                            <option value="" disabled {% if not category %}selected{% endif %}>Select a category</option>
                            <option value="Food" {% if category == 'Food' %}selected{% endif %}>Food</option>
                            <option value="Transport" {% if category == 'Transport' %}selected{% endif %}>Transport</option>
                            <option value="Bills" {% if category == 'Bills' %}selected{% endif %}>Bills</option>
                            <option value="Health" {% if category == 'Health' %}selected{% endif %}>Health</option>
                            <option value="Healthcare" {% if category == 'Healthcare' %}selected{% endif %}>Healthcare</option>
                            <option value="Travel" {% if category == 'Travel' %}selected{% endif %}>Travel</option>
                            <option value="Entertainment" {% if category == 'Entertainment' %}selected{% endif %}>Entertainment</option>
                            <option value="Shopping" {% if category == 'Shopping' %}selected{% endif %}>Shopping</option>
                            <option value="Other" {% if category == 'Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" 
                           class="form-input" value="{{ date or '' }}" required>
                </div>

                <div class="form-group">
                    <label for="description">Description (optional)</label>
                    <input type="text" id="description" name="description" 
                           class="form-input" placeholder="What was this for?" 
                           maxlength="200" value="{{ description or '' }}">
                </div>

                <div class="form-actions">
                    <a href="{{ url_for('profile') }}" class="btn-cancel">Cancel</a>
                    <button type="submit" class="btn-submit">Add Expense</button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
